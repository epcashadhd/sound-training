<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聲量訓練系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=cwTeXYen&display=swap" rel="stylesheet">
    <style>
        /* Soft, Counselling-Style Theme */
        :root {
            --bg-color: #F7F5F0;
            --panel-bg: #FFFFFF;
            --text-main: #6B635A;
            --text-light: #9E968D;
            --border-color: #EBE6DD;
            --btn-green: #A3B899;
            --btn-green-hover: #8DA384;
            --btn-rose: #E0B0A6;
            --btn-rose-hover: #C99A90;
            --bar-gradient: linear-gradient(to top, #A3B899, #E8D595, #E0B0A6);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "cwTeXYen", "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Left Panel */
        #left-panel {
            width: 15%;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            box-shadow: 2px 0 15px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
            box-sizing: border-box;
            z-index: 10;
        }

        #restart-btn {
            background-color: var(--btn-rose);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 10px rgba(224, 176, 166, 0.3);
        }

        #restart-btn:hover {
            background-color: var(--btn-rose-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(224, 176, 166, 0.4);
        }

        #restart-btn:active {
            transform: translateY(0);
        }

        #volume-container {
            flex-grow: 1;
            width: 60px;
            background-color: #F0EBE1;
            border-radius: 30px;
            margin: 10px 0 20px 0;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.05);
        }

        #volume-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: var(--bar-gradient);
            /* Smooth transition for the bar moving up */
            transition: height 0.5s ease-out;
        }

        .scale-marks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px 0;
            box-sizing: border-box;
            pointer-events: none;
        }

        .scale-mark {
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: var(--text-main);
            font-weight: 600;
            opacity: 0.6;
            z-index: 2;
        }

        /* Center Panel */
        #center-panel {
            width: 65%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #FFFFFF 0%, var(--bg-color) 100%);
        }

        #animation-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .anim-wrapper {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            /* Slower, softer transition for counselling style */
            transition: bottom 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: center center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* SVG Animations */
        .svg-bubble {
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
            animation: breathe 4s ease-in-out infinite;
        }
        
        #balloon {
            transition: bottom 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(-2deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        .balloon-string {
            transform-origin: top center;
            animation: string-sway 3s ease-in-out infinite alternate;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        @keyframes string-sway {
            0% { transform: rotate(-2deg); }
            100% { transform: rotate(2deg); }
        }

        /* Right Panel */
        #right-panel {
            width: 20%;
            background-color: var(--panel-bg);
            border-left: 1px solid var(--border-color);
            box-shadow: -2px 0 15px rgba(0,0,0,0.02);
            padding: 40px 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 35px;
            z-index: 10;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #mic-btn {
            background-color: var(--btn-green);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(163, 184, 153, 0.4);
        }

        #mic-btn:hover {
            background-color: var(--btn-green-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(163, 184, 153, 0.5);
        }
        
        #mic-btn:active {
            transform: translateY(0);
        }

        #mic-btn.active {
            background-color: #FFFFFF;
            border: 2px solid var(--btn-green);
            color: var(--btn-green);
            box-shadow: none;
        }

        /* Sensitivity Boxes */
        .stars-container {
            display: flex;
            gap: 5px;
            cursor: pointer;
            padding: 5px 0;
            justify-content: center;
        }
        
        .sensitivity-box {
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-light);
            border-radius: 4px;
            transition: all 0.2s ease;
            background-color: transparent;
        }
        
        .sensitivity-box.filled {
            background-color: #FFD700; /* Gold/Yellow */
            border-color: #E6C200;
        }
        
        .sensitivity-box:hover {
            transform: scale(1.1);
        }

        /* Theme Selector */
        .theme-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .theme-option {
            background: #F0EBE1;
            padding: 12px 10px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid transparent;
            font-weight: 600;
            color: var(--text-light);
            text-align: center;
            flex: 1;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .theme-option.active {
            background: #FFFFFF;
            border-color: var(--btn-rose);
            color: var(--btn-rose);
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(224, 176, 166, 0.3);
            z-index: 2;
        }
        
        .theme-option:hover:not(.active) {
            background: #FFFFFF;
            transform: translateY(-2px);
        }

        h2 {
            margin: 0;
            text-align: center;
            font-size: 18px;
            color: var(--text-main);
            font-weight: 700;
        }
        
        label {
            font-size: 15px;
            color: var(--text-main);
            font-weight: 600;
        }

        /* Balloon Image Style */
        .balloon-img {
            width: 200px;
            position: relative;
            margin-bottom: 50px;
            z-index: 2;
            filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.4));
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            /* Adjust Panel Widths */
            #left-panel { width: 20%; padding: 10px 5px; }
            #right-panel { width: 25%; padding: 10px 5px; }
            #center-panel { width: 55%; }

            /* Scale down volume bar */
            #volume-container { width: 30px; border-radius: 15px; }
            .scale-mark { font-size: 10px; }
            h2 { font-size: 12px; }

            /* Scale down controls */
            #mic-btn, #restart-btn { padding: 8px 4px; font-size: 11px; border-radius: 10px; }
            .control-group { gap: 5px; }
            label { font-size: 11px; }

            /* Sensitivity Boxes */
            .sensitivity-box { width: 10px; height: 10px; border-width: 1px; border-radius: 2px; }
            .stars-container { gap: 2px; flex-wrap: wrap; }

            /* Theme Selector */
            .theme-option { padding: 5px; font-size: 10px; border-radius: 8px; }
            .theme-selector { gap: 5px; }

            /* Balloon/Bubble Size */
            .balloon-img { width: 80px; margin-bottom: 20px; }
            .svg-bubble { width: 80px !important; height: 80px !important; }
        }
    </style>
</head>
<body>

    <!-- Left Panel -->
    <div id="left-panel">
        <h2>聲量</h2>
        <div id="volume-container">
            <div id="volume-bar"></div>
            <div class="scale-marks">
                <div class="scale-mark">10</div>
                <div class="scale-mark">9</div>
                <div class="scale-mark">8</div>
                <div class="scale-mark">7</div>
                <div class="scale-mark">6</div>
                <div class="scale-mark">5</div>
                <div class="scale-mark">4</div>
                <div class="scale-mark">3</div>
                <div class="scale-mark">2</div>
                <div class="scale-mark">1</div>
                <div class="scale-mark">0</div>
            </div>
        </div>
    </div>

    <!-- Center Panel -->
    <div id="center-panel">
        <div id="animation-container">
            <div id="anim-wrapper" class="anim-wrapper theme-balloon">
                <div id="anim-element"></div>
            </div>
        </div>
    </div>

    <!-- Right Panel -->
    <div id="right-panel">
        <div class="control-group">
            <button id="mic-btn">開啟咪高峰</button>
            <button id="restart-btn">重新開始</button>
        </div>
        
        <div class="control-group">
            <label>靈敏度</label>
            <div id="sensitivity-stars" class="stars-container">
                <!-- Stars injected by JS -->
            </div>
        </div>
        
        <div class="control-group">
            <label>主題</label>
            <div class="theme-selector">
                <div class="theme-option active" data-theme="balloon">
                    <span>氫氣球</span>
                </div>
                <div class="theme-option" data-theme="bubble">
                    <span>泡泡</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let audioContext;
        let analyser;
        let microphone;
        let dataArray;
        let isRecording = false;
        let maxVolume = 0; // Holds the highest volume reached
        let noiseFloor = 0; // Ambient noise level
        let animationFrameId;
        let sensitivity = 4; // Default sensitivity (1-8)
        let currentTheme = 'balloon';

        const volumeBar = document.getElementById('volume-bar');
        const restartBtn = document.getElementById('restart-btn');
        const micBtn = document.getElementById('mic-btn');
        const sensitivityStarsContainer = document.getElementById('sensitivity-stars');
        const animWrapper = document.getElementById('anim-wrapper');
        const animElement = document.getElementById('anim-element');
        const centerPanel = document.getElementById('center-panel');
        const themeOptions = document.querySelectorAll('.theme-option');

        // Init Sensitivity Boxes
        function initSensitivity() {
            sensitivityStarsContainer.innerHTML = '';
            for (let i = 1; i <= 8; i++) {
                const box = document.createElement('div');
                box.className = `sensitivity-box ${i <= sensitivity ? 'filled' : ''}`;
                box.addEventListener('click', () => {
                    sensitivity = i;
                    updateSensitivityUI();
                    resetApp(); // Reset when sensitivity changes
                });
                sensitivityStarsContainer.appendChild(box);
            }
        }

        function updateSensitivityUI() {
            const boxes = sensitivityStarsContainer.querySelectorAll('.sensitivity-box');
            boxes.forEach((box, index) => {
                if (index < sensitivity) {
                    box.classList.add('filled');
                } else {
                    box.classList.remove('filled');
                }
            });
        }
        
        initSensitivity();

        // Theme Selection
        themeOptions.forEach(option => {
            option.addEventListener('click', () => {
                // Update UI
                themeOptions.forEach(opt => opt.classList.remove('active'));
                option.classList.add('active');
                
                // Update State
                currentTheme = option.dataset.theme;
                updateTheme(currentTheme);
                
                // Reset App
                resetApp();
            });
        });

        function resetApp() {
            maxVolume = 0;
            volumeBar.style.height = '0%';
            updateAnimation(0);
            
            // Calibrate noise floor if recording
            if (isRecording && analyser) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    sum += dataArray[i];
                }
                let average = sum / dataArray.length;
                noiseFloor = average;
                console.log("Noise floor calibrated to:", noiseFloor);
            } else {
                noiseFloor = 0;
            }
        }

        // Restart button
        restartBtn.addEventListener('click', resetApp);

        function updateTheme(theme) {
            // Reset styles and classes
            animWrapper.className = `anim-wrapper theme-${theme}`;
            animWrapper.style.transform = 'translateX(-50%)';
            animWrapper.style.bottom = '20px';
            animElement.innerHTML = '';
            
            switch(theme) {
                case 'balloon':
                    animElement.innerHTML = `
                        <img id="balloon" src="https://i.imgur.com/NEzsWLP.png" class="balloon-img">
                    `;
                    break;
                case 'bubble':
                    animElement.innerHTML = `
                        <svg viewBox="0 0 100 100" width="200" height="200" class="svg-bubble">
                          <defs>
                            <radialGradient id="bubbleGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                              <stop offset="0%" style="stop-color:#fff;stop-opacity:0" />
                              <stop offset="80%" style="stop-color:#fff;stop-opacity:0.1" />
                              <stop offset="100%" style="stop-color:#a1c4fd;stop-opacity:0.6" />
                            </radialGradient>
                            <filter id="bubbleGlow">
                              <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
                              <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                              </feMerge>
                            </filter>
                          </defs>
                          <circle cx="50" cy="50" r="45" fill="url(#bubbleGrad)" stroke="#c2e9fb" stroke-width="1" filter="url(#bubbleGlow)"/>
                          <!-- Highlights -->
                          <path d="M 25,25 Q 40,15 60,20" stroke="white" stroke-width="2" fill="none" opacity="0.8" stroke-linecap="round"/>
                          <ellipse cx="30" cy="30" rx="5" ry="3" fill="white" opacity="0.9" transform="rotate(-45 30 30)"/>
                          <ellipse cx="70" cy="70" rx="3" ry="2" fill="white" opacity="0.6" transform="rotate(-45 70 70)"/>
                        </svg>
                    `;
                    animWrapper.style.bottom = '50%';
                    animWrapper.style.transform = 'translate(-50%, 50%) scale(1)';
                    break;
            }
        }

        // Start/Stop Mic
        micBtn.addEventListener('click', async () => {
            if (isRecording) {
                // Stop recording
                if (audioContext) {
                    audioContext.close();
                }
                cancelAnimationFrame(animationFrameId);
                isRecording = false;
                micBtn.textContent = '開啟咪高峰';
                micBtn.classList.remove('active');
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                
                analyser.smoothingTimeConstant = 0.8;
                analyser.fftSize = 256;
                
                microphone.connect(analyser);
                
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                isRecording = true;
                micBtn.textContent = '接收聲音中...';
                micBtn.classList.add('active');
                
                // Initial calibration delay
                setTimeout(() => {
                    if(isRecording) {
                        analyser.getByteFrequencyData(dataArray);
                        let sum = 0;
                        for (let i = 0; i < dataArray.length; i++) {
                            sum += dataArray[i];
                        }
                        noiseFloor = sum / dataArray.length;
                    }
                }, 500);
                
                update();
            } catch (err) {
                console.error('Error accessing microphone:', err);
                alert('無法開啟咪高峰！請確保瀏覽器允許咗咪高峰權限。');
            }
        });

        function update() {
            if (!isRecording) return;
            
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            let average = sum / dataArray.length;
            
            // Subtract noise floor
            let adjustedAverage = Math.max(0, average - noiseFloor);
            
            // Map adjusted average to 0-100%
            // Apply sensitivity multiplier (1-8 scale)
            const multiplier = sensitivity / 4;
            
            // 128 is used as a baseline for a decently loud sound
            // We use a slightly smaller divisor since we subtracted noise
            let currentVolume = (adjustedAverage / 100) * 100 * multiplier;
            currentVolume = Math.min(100, Math.max(0, currentVolume));
            
            // Hold the maximum volume reached
            if (currentVolume > maxVolume) {
                maxVolume = currentVolume;
                
                // Update UI only when max volume increases
                volumeBar.style.height = `${maxVolume}%`;
                updateAnimation(maxVolume);
            }
            
            animationFrameId = requestAnimationFrame(update);
        }

        function updateAnimation(volumePercent) {
            const theme = currentTheme;
            const normalizedVol = volumePercent / 100; // 0 to 1
            
            switch(theme) {
                case 'balloon':
                    // Rises to top slowly
                    // Balloon image is roughly 300px tall visually including string
                    // We want to keep it from hitting the top.
                    // Check if mobile (simple check)
                    const isMobile = window.innerWidth <= 768;
                    const balloonHeight = isMobile ? 120 : 350; // Adjusted for mobile size
                    
                    const maxBottom = centerPanel.clientHeight - balloonHeight - 20; // 20px padding from top
                    
                    animWrapper.style.bottom = `${20 + normalizedVol * maxBottom}px`;
                    animWrapper.style.transform = 'translateX(-50%)';
                    break;
                case 'bubble':
                    // Stays in center, scales up
                    // Calculate max allowed size (85% of the smallest screen dimension to stay within bounds)
                    const minDimension = Math.min(centerPanel.clientWidth, centerPanel.clientHeight);
                    const maxAllowedSize = minDimension * 0.85;
                    const baseSize = window.innerWidth <= 768 ? 80 : 200; // Base size matches CSS
                    
                    // Start from a small size (e.g., 20% of base)
                    const startSize = baseSize * 0.2;
                    const minScale = startSize / baseSize;
                    const maxScale = maxAllowedSize / baseSize;
                    
                    const scale = minScale + normalizedVol * (maxScale - minScale);
                    
                    animWrapper.style.bottom = '50%';
                    animWrapper.style.transform = `translate(-50%, 50%) scale(${scale})`;
                    break;
            }
        }

        // Initialize
        updateTheme('balloon');
    </script>
</body>
</html>
